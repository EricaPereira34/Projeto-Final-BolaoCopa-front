<div class="container mt-4">

    <h2>Cadastro de Palpites</h2>

    <div class="mb-3">
        <label class="form-label">Participante</label>
        <input
            type="text"
            class="form-control"
            [(ngModel)]="palpite.participante">
    </div>

    <div class="mb-3">
        <label class="form-label">Time A</label>
        <input
            type="text"
            class="form-control"
            [(ngModel)]="palpite.timeA">
    </div>

    <div class="mb-3">
        <label class="form-label">Time B</label>
        <input
            type="text"
            class="form-control"
            [(ngModel)]="palpite.timeB">
    </div>

    <div class="mb-3">
        <label class="form-label">Gols Time A</label>
        <input
            type="number"
            class="form-control"
            [(ngModel)]="palpite.golsTimeA">
    </div>

    <div class="mb-3">
        <label class="form-label">Gols Time B</label>
        <input
            type="number"
            class="form-control"
            [(ngModel)]="palpite.golsTimeB">
    </div>

    <button
        class="btn btn-success"
        (click)="salvar()">
        {{ palpite.id === 0 ? 'Salvar' : 'Atualizar' }}
    </button>

    <button
        class="btn btn-secondary ms-2"
        (click)="limparFormulario()">
        Limpar
    </button>

    <hr>

    <h2>Lista de Palpites</h2>

    <table class="table table-striped table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Participante</th>
                <th>Time A</th>
                <th>Time B</th>
                <th>Gols Time A</th>
                <th>Gols Time B</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let palpite of palpites">

                <td>{{ palpite.id }}</td>
                <td>{{ palpite.participante }}</td>
                <td>{{ palpite.timeA }}</td>
                <td>{{ palpite.timeB }}</td>
                <td>{{ palpite.golsTimeA }}</td>
                <td>{{ palpite.golsTimeB }}</td>

                <td>

                    <button
                        class="btn btn-warning btn-sm me-2"
                        (click)="editar(palpite)">
                        Editar
                    </button>

                    <button
                        class="btn btn-danger btn-sm"
                        (click)="excluir(palpite.id)">
                        Excluir
                    </button>

                </td>

            </tr>
        </tbody>

    </table>

</div>
